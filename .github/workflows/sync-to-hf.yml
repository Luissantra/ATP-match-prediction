name: Sync to HuggingFace Space

# Despliega main a HuggingFace Spaces en cada push (deploy continuo).
# Convierte los .pkl a Git LFS sobre el checkout efímero de CI: la historia de
# GitHub NO se reescribe; solo el repo del Space queda con los binarios en LFS.
#
# Requisito: secret HF_TOKEN (token de escritura de https://huggingface.co/settings/tokens)
# en GitHub → Settings → Secrets and variables → Actions.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Convertir .pkl a Git LFS (solo en CI) y empujar a HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git lfs install
          git lfs migrate import --include="*.pkl" --everything --yes
          git push --force \
            "https://Luissantra:${HF_TOKEN}@huggingface.co/spaces/Luissantra/ATP-Prediction" \
            HEAD:main
